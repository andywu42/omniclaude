#
# ONEX Node Contract
# Node: NodeChannelTelegramAdapter

name: node_channel_telegram_adapter
contract_name: node_channel_telegram_adapter
node_name: node_channel_telegram_adapter

contract_version:
  major: 1
  minor: 0
  patch: 0

node_version:
  major: 0
  minor: 1
  patch: 0

node_type: EFFECT_GENERIC

description: >
  Telegram channel adapter. Bridges aiogram bot events to/from
  ModelChannelEnvelope on the OmniClaw event bus. Inbound handler
  converts Telegram messages to normalized envelopes; outbound handler
  sends replies via Telegram Bot API.

event_bus:
  subscribe_topics:
    - "onex.cmd.omniclaw.telegram-outbound.v1"
  publish_topics:
    - "onex.cmd.omniclaw.channel-message-received.v1"

consumed_events:
  - topic: "onex.cmd.omniclaw.telegram-outbound.v1"
    event_type: "ChannelOutbound"
    message_category: "COMMAND"
    description: "Reply to be sent to a Telegram chat"

published_events:
  - topic: "onex.cmd.omniclaw.channel-message-received.v1"
    event_type: "ChannelMessageReceived"
    description: "Normalized inbound message from Telegram"

handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "channel.telegram.inbound"
      handler:
        name: "HandlerTelegramInbound"
        module: "omniclaude.nodes.node_channel_telegram_adapter.handlers.handler_inbound"
      description: "Convert Telegram message to ModelChannelEnvelope and publish"
    - operation: "channel.telegram.outbound"
      handler:
        name: "HandlerTelegramOutbound"
        module: "omniclaude.nodes.node_channel_telegram_adapter.handlers.handler_outbound"
      description: "Send reply to Telegram chat via Bot API"
  execution_mode: "single"
  max_timeout_seconds: 30

dependencies:
  - name: telegram_bot_token
    type: environment
    key: TELEGRAM_BOT_TOKEN
    required: true
    description: "Telegram bot token from BotFather"

metadata:
  author: OmniNode Team
  license: MIT
  tags:
    - omniclaw
    - channel
    - telegram
    - adapter

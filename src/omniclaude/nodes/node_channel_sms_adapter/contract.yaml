#
# ONEX Node Contract
# Node: NodeChannelSmsAdapter

name: node_channel_sms_adapter
contract_name: node_channel_sms_adapter
node_name: node_channel_sms_adapter

contract_version:
  major: 1
  minor: 0
  patch: 0

node_version:
  major: 0
  minor: 1
  patch: 0

node_type: EFFECT_GENERIC

description: >
  SMS/Twilio channel adapter. Receives inbound SMS via Twilio webhook
  and sends replies via Twilio API. Supports MMS attachment metadata
  via Twilio media URLs.

event_bus:
  subscribe_topics:
    - "onex.cmd.omniclaw.sms-outbound.v1"
  publish_topics:
    - "onex.cmd.omniclaw.channel-message-received.v1"

consumed_events:
  - topic: "onex.cmd.omniclaw.sms-outbound.v1"
    event_type: "ChannelOutbound"
    message_category: "COMMAND"
    description: "Reply to be sent via Twilio SMS"

published_events:
  - topic: "onex.cmd.omniclaw.channel-message-received.v1"
    event_type: "ChannelMessageReceived"
    description: "Normalized inbound SMS message from Twilio"

handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "channel.sms.inbound"
      handler:
        name: "HandlerSmsInbound"
        module: "omniclaude.nodes.node_channel_sms_adapter.handlers.handler_inbound"
      description: "Parse Twilio webhook payload into ModelChannelEnvelope"
    - operation: "channel.sms.outbound"
      handler:
        name: "HandlerSmsOutbound"
        module: "omniclaude.nodes.node_channel_sms_adapter.handlers.handler_outbound"
      description: "Send reply via Twilio Messages API"
  execution_mode: "single"
  max_timeout_seconds: 30

dependencies:
  - name: twilio_account_sid
    type: environment
    key: TWILIO_ACCOUNT_SID
    required: true
    description: "Twilio account SID"
  - name: twilio_auth_token
    type: environment
    key: TWILIO_AUTH_TOKEN
    required: true
    description: "Twilio auth token for API and webhook signature validation"
  - name: twilio_phone_number
    type: environment
    key: TWILIO_PHONE_NUMBER
    required: true
    description: "Twilio phone number for sending SMS"

metadata:
  author: OmniNode Team
  license: MIT
  tags:
    - omniclaw
    - channel
    - sms
    - twilio
    - adapter

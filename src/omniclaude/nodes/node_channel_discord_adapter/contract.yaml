#
# ONEX Node Contract
# Node: NodeChannelDiscordAdapter

name: node_channel_discord_adapter
contract_name: node_channel_discord_adapter
node_name: node_channel_discord_adapter

contract_version:
  major: 1
  minor: 0
  patch: 0

node_version:
  major: 0
  minor: 1
  patch: 0

node_type: EFFECT_GENERIC

description: >
  Discord channel adapter. Bridges discord.py bot events to/from
  ModelChannelEnvelope on the OmniClaw event bus. Inbound handler
  converts Discord messages to normalized envelopes; outbound handler
  sends replies via Discord API.

event_bus:
  event_bus_enabled: true
  subscribe_topics:
    - "onex.cmd.omniclaw.discord-outbound.v1"
  publish_topics:
    - "onex.cmd.omniclaw.channel-message-received.v1"

consumed_events:
  - topic: "onex.cmd.omniclaw.discord-outbound.v1"
    event_type: "ChannelOutbound"
    message_category: "COMMAND"
    description: "Reply to be sent to a Discord channel"

published_events:
  - topic: "onex.cmd.omniclaw.channel-message-received.v1"
    event_type: "ChannelMessageReceived"
    description: "Normalized inbound message from Discord"

handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "channel.discord.inbound"
      handler:
        name: "HandlerDiscordInbound"
        module: "omniclaude.nodes.node_channel_discord_adapter.handlers.handler_inbound"
      description: "Convert Discord message to ModelChannelEnvelope and publish"
    - operation: "channel.discord.outbound"
      handler:
        name: "HandlerDiscordOutbound"
        module: "omniclaude.nodes.node_channel_discord_adapter.handlers.handler_outbound"
      description: "Send reply to Discord channel via bot API"
  execution_mode: "single"
  max_timeout_seconds: 30

dependencies:
  - name: discord_bot_token
    type: environment
    key: DISCORD_BOT_TOKEN
    required: true
    description: "Discord bot token for authentication"

metadata:
  author: OmniNode Team
  license: MIT
  tags:
    - omniclaw
    - channel
    - discord
    - adapter

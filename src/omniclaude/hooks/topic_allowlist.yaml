#
# topic_allowlist.yaml — TopicBase entries with no corresponding contract declaration.
#
# CI fails if any TopicBase entry is absent from both contracts AND this allowlist.
# Add entries here only when the contract schema cannot declare the topic (e.g., a
# node contract only supports one topic_base and the topic is a secondary emission
# target, or the topic is a cross-domain internal control plane topic with no
# dedicated node contract), OR when the topic pre-dates contract governance (Phase 1
# scope) and will be governed in a later phase.
#
# Each entry must document:
#   topic:     the exact wire topic string (must match a TopicBase member value)
#   lifecycle: classification (see below)
#   reason:    why this topic is not in a contract declaration
#   ticket:    Linear ticket that added this entry
#
# Lifecycle values:
#   integration      — stable, consumed by downstream services
#   telemetry        — best-effort, may be sampled or dropped
#   internal_control — cross-domain control plane, not an observability topic
#   observability    — hook/daemon observability topics, broad access
#   legacy           — kept for backwards compat, pending removal
#   pre_governance   — topic predates contract governance; to be governed in future phase
#
# (OMN-3294)

allowed_extras:
  # ---------------------------------------------------------------------------
  # CMD topics: dual-emission targets and cross-domain control topics
  # These cannot be declared in a node contract's event_bus.topic_base since the
  # schema supports only one topic_base per contract.
  # ---------------------------------------------------------------------------

  - topic: "onex.cmd.omniintelligence.routing-decision.v1"
    lifecycle: internal_control
    reason: >
      Producer is omniclaude; domain is omniintelligence. This is the CMD half of the
      dual-emission pattern in node_routing_emission_effect. The contract schema only
      supports one topic_base (the EVT topic), so this CMD topic cannot be declared
      there. Intentional cross-domain CMD — do NOT rename.
    ticket: OMN-3294


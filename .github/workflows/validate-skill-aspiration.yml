---
name: Skill Aspiration

on:
  push:
    branches: [main]
    paths:
      - 'plugins/onex/skills/**/*.md'
      - 'plugins/onex/skills/_lib/validate_skill_aspiration.py'
      - 'scripts/extract_skill_claims.py'
      - 'scripts/validation/validate_skill_aspiration.py'
      - 'tests/unit/skills/_lib/test_validate_skill_aspiration.py'
      - '.github/workflows/validate-skill-aspiration.yml'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/onex/skills/**/*.md'
      - 'plugins/onex/skills/_lib/validate_skill_aspiration.py'
      - 'scripts/extract_skill_claims.py'
      - 'scripts/validation/validate_skill_aspiration.py'
      - 'tests/unit/skills/_lib/test_validate_skill_aspiration.py'
      - '.github/workflows/validate-skill-aspiration.yml'
  merge_group:

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.6.1"

concurrency:
  group: skill-aspiration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: >-
      ${{
        (vars.USE_SELF_HOSTED_RUNNERS == 'true' &&
         (github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule'))
        && fromJSON('["self-hosted","omnibase-ci"]')
        || fromJSON('["ubuntu-latest"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout omniclaude
        uses: actions/checkout@v6

      - name: Checkout omnimarket
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omnimarket
          path: _omnimarket
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run skill aspiration unit tests
        run: uv run pytest tests/unit/skills/_lib/test_validate_skill_aspiration.py -v

      - name: Validate SKILL.md claims against backing-node behavior
        env:
          OMNIMARKET_ROOT: _omnimarket
        run: uv run python scripts/validation/validate_skill_aspiration.py

        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load cached venv
        if: ${{ vars.OMNI_ENABLE_VENV_CACHE_RESTORE == 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: uv sync --frozen --group dev

      - name: Run merge-sweep contract tests
        working-directory: ${{ github.workspace }}
        run: uv run pytest tests/integration/skills/merge_sweep/ -v -m "unit and not integration"

  # ---------------------------------------------------------------------------
  # Skill Contract Validation (OMN-6193)
  # ---------------------------------------------------------------------------
  # Validates argument parity, sub-skill references, duplicate frontmatter,
  # and spec-prompt predicate coverage across all skills.
  skill-contract-validation:
    name: Skill Contract Validation
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout onex_change_control validator
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/onex_change_control
          ref: main
          token: ${{ secrets.CROSS_REPO_PAT || github.token }}
          path: onex_change_control
          sparse-checkout: |
            scripts/validation/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate skill contracts
        # Initially without --strict; promote to --strict after baseline warnings are resolved
        working-directory: ${{ github.workspace }}
        run: python onex_change_control/scripts/validation/validate_skill_contracts.py --skills-root plugins/onex/skills

  # ============================================================================
  # ONEX Compliance Check
  # Runs `onex compliance check` to validate contracts, handlers, and schemas.
  # External-service checks WARN only (not FAIL) — structural failures remain FAIL.
  # Conditional: only runs if the `onex compliance` command is available.
  # ============================================================================
  compliance:
    name: Contract Compliance
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: uv sync --frozen --group dev

      - name: Check if onex compliance command exists
        id: check-command
        working-directory: ${{ github.workspace }}
        run: |
          if uv run onex compliance check --help >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::onex compliance check command not available yet — skipping"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run onex compliance check
        id: compliance
        if: steps.check-command.outputs.available == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p .onex_state/compliance
          if uv run onex compliance check --repo-root . --output .onex_state/compliance/report.yaml; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "::warning::ONEX compliance check reported failures (warn-only for external-service checks)"
          fi

      - name: Upload compliance report
        if: always() && steps.check-command.outputs.available == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: compliance-report
          path: .onex_state/compliance/report.yaml
          retention-days: 30

  # ============================================================================
  # AISLOP SWEEP GATE (OMN-8622)
  # Detects AI-generated quality anti-patterns: prohibited env vars, hardcoded
  # Kafka topics (outside enum definitions), and backwards-compat shims.
  # Fails on CRITICAL or ERROR findings. Warn-only for WARNING findings.
  # NOTE: This gate must pass on main — land AFTER hardcoded-path fixes merge.
  # ============================================================================
  aislop-sweep:
    name: Aislop Sweep
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Detect AI anti-patterns
        working-directory: ${{ github.workspace }}
        run: python scripts/ci/run_aislop_sweep.py

  # Agent YAML contract validation (OMN-8914)
  agent-contract-validation:
    name: Agent Contract Validation
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: uv sync --frozen

      - name: Validate all agent YAML contracts
        id: validator
        working-directory: ${{ github.workspace }}
        run: |
          if bash plugins/onex/scripts/validate-all-agents.sh; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "::warning::Agent YAML contract validation reported failures (warn-only during Wave B rollout)"
          fi

  # Skill monorepo-ref lint gate (OMN-8795 SD-08)
  # NOTE: This gate will FAIL until SD-04/SD-05/SD-07 violations are cleared.
  # Land this PR last in the SD wave so the gate goes green on merge.
  skill-monorepo-ref-gate:
    name: Skill Monorepo-Ref Gate
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect monorepo refs in skill files
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-skill-monorepo-refs.sh

  # ============================================================================
  # GATE AGGREGATORS
  # Gate names are API-stable per CI/CD Standards (Invariant 1).
  # Do NOT rename without following the Branch Protection Migration Safety
  # procedure in docs/standards/CI_CD_STANDARDS.md.
  # ============================================================================

  quality-gate:
    name: Quality Gate
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs:
      - quality
      - pyright
      - check-handshake
      - enum-governance
      - exports-validation
      - env-var-registry
      - cross-repo-validation
      - migration-freeze
      - onex-validation
      # Architecture enforcement gates (OMN-2592)
      - arch-no-db-in-orchestrator
      - arch-no-git-outside-effects
      - arch-no-linear-outside-effects
      - arch-no-repo-adapter-in-orchestrator
      - arch-no-direct-adapter-in-business-logic
      - arch-no-direct-bus-instantiation
      - arch-no-raw-sqlite3-in-handlers
      - arch-no-env-fallbacks
      - arch-cost-ledger-isolation
      - arch-topic-naming
      - arch-omnidash-db-role
      - arch-cost-ledger-structure
      - arch-no-direct-kafka-producer
      - arch-no-utcnow
      - arch-no-hardcoded-ip
      # F5 checks (OMN-2595)
      - arch-no-compact-cmd-topic
      # CDQA-07 (OMN-2977)
      - arch-invariants
      # Version pin compliance (OMN-4810)
      - version-pin-check
      # Skill hygiene (OMN-5200)
      - skill-hygiene
      # Mode metadata integrity (OMN-5402)
      - mode-metadata-guard
      # Merge-sweep contract (OMN-6189)
      - merge-sweep-contract
      # Skill contract validation (OMN-6193)
      - skill-contract-validation
      # Golden chain integrity (OMN-7389)
      - golden-chain-integrity
      # AI anti-pattern detection (OMN-8622)
      - aislop-sweep
      # Agent YAML contract validation (OMN-8914)
      - agent-contract-validation
      # Skill monorepo-ref lint gate (OMN-8795 SD-08)
      - skill-monorepo-ref-gate
    if: always()
    steps:
      - name: Check quality results
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== Quality Gate ==="
          FAILED=false

          for check in \
            "quality=${{ needs.quality.result }}" \
            "pyright=${{ needs.pyright.result }}" \
            "check-handshake=${{ needs.check-handshake.result }}" \
            "enum-governance=${{ needs.enum-governance.result }}" \
            "exports-validation=${{ needs.exports-validation.result }}" \
            "env-var-registry=${{ needs.env-var-registry.result }}" \
            "cross-repo-validation=${{ needs.cross-repo-validation.result }}" \
            "migration-freeze=${{ needs.migration-freeze.result }}" \
            "onex-validation=${{ needs.onex-validation.result }}" \
            "arch-no-db-in-orchestrator=${{ needs.arch-no-db-in-orchestrator.result }}" \
            "arch-no-git-outside-effects=${{ needs.arch-no-git-outside-effects.result }}" \
            "arch-no-linear-outside-effects=${{ needs.arch-no-linear-outside-effects.result }}" \
            "arch-no-repo-adapter-in-orchestrator=${{ needs.arch-no-repo-adapter-in-orchestrator.result }}" \
            "arch-no-direct-adapter-in-business-logic=${{ needs.arch-no-direct-adapter-in-business-logic.result }}" \
            "arch-no-direct-bus-instantiation=${{ needs.arch-no-direct-bus-instantiation.result }}" \
            "arch-no-raw-sqlite3-in-handlers=${{ needs.arch-no-raw-sqlite3-in-handlers.result }}" \
            "arch-no-env-fallbacks=${{ needs.arch-no-env-fallbacks.result }}" \
            "arch-cost-ledger-isolation=${{ needs.arch-cost-ledger-isolation.result }}" \
            "arch-topic-naming=${{ needs.arch-topic-naming.result }}" \
            "arch-omnidash-db-role=${{ needs.arch-omnidash-db-role.result }}" \
            "arch-cost-ledger-structure=${{ needs.arch-cost-ledger-structure.result }}" \
            "arch-no-direct-kafka-producer=${{ needs.arch-no-direct-kafka-producer.result }}" \
            "arch-no-utcnow=${{ needs.arch-no-utcnow.result }}" \
            "arch-no-hardcoded-ip=${{ needs.arch-no-hardcoded-ip.result }}" \
            "arch-no-compact-cmd-topic=${{ needs.arch-no-compact-cmd-topic.result }}" \
            "arch-invariants=${{ needs.arch-invariants.result }}" \
            "version-pin-check=${{ needs.version-pin-check.result }}" \
            "skill-hygiene=${{ needs.skill-hygiene.result }}" \
            "mode-metadata-guard=${{ needs.mode-metadata-guard.result }}" \
            "merge-sweep-contract=${{ needs.merge-sweep-contract.result }}" \
            "skill-contract-validation=${{ needs.skill-contract-validation.result }}" \
            "golden-chain-integrity=${{ needs.golden-chain-integrity.result }}" \
            "aislop-sweep=${{ needs.aislop-sweep.result }}" \
            "agent-contract-validation=${{ needs.agent-contract-validation.result }}" \
            "skill-monorepo-ref-gate=${{ needs.skill-monorepo-ref-gate.result }}"; do
            NAME="${check%%=*}"
            RESULT="${check##*=}"
            if [ "$RESULT" != "success" ] && [ "$RESULT" != "skipped" ]; then
              echo "::error::$NAME failed (result: $RESULT)"
              FAILED=true
            else
              echo "$NAME: $RESULT"
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "Quality Gate FAILED"
            exit 1
          fi
          echo ""
          echo "Quality Gate PASSED"

  tests-gate:
    name: Tests Gate
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs:
      - test
      - hooks-tests
      - agent-framework-tests
      - database-validation
    if: always()
    steps:
      - name: Check test results
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== Tests Gate ==="
          FAILED=false

          for check in \
            "test=${{ needs.test.result }}" \
            "hooks-tests=${{ needs.hooks-tests.result }}" \
            "agent-framework-tests=${{ needs.agent-framework-tests.result }}" \
            "database-validation=${{ needs.database-validation.result }}"; do
            NAME="${check%%=*}"
            RESULT="${check##*=}"
            if [ "$RESULT" != "success" ] && [ "$RESULT" != "skipped" ]; then
              echo "::error::$NAME failed (result: $RESULT)"
              FAILED=true
            else
              echo "$NAME: $RESULT"
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "Tests Gate FAILED"
            exit 1
          fi
          echo ""
          echo "Tests Gate PASSED"

  security-gate:
    name: Security Gate
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs:
      - security-python
      - detect-secrets
    if: always()
    steps:
      - name: Check security results
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== Security Gate ==="
          FAILED=false

          for check in \
            "security-python=${{ needs.security-python.result }}" \
            "detect-secrets=${{ needs.detect-secrets.result }}"; do
            NAME="${check%%=*}"
            RESULT="${check##*=}"
            if [ "$RESULT" != "success" ] && [ "$RESULT" != "skipped" ]; then
              echo "::error::$NAME failed (result: $RESULT)"
              FAILED=true
            else
              echo "$NAME: $RESULT"
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "Security Gate FAILED"
            exit 1
          fi
          echo ""
          echo "Security Gate PASSED"

  # ============================================================================
  # CROSS-REPO BOUNDARY PARITY (OMN-5771)
  # Validates Kafka topic boundaries against onex_change_control manifest.
  # warn-only until all violations fixed (see OMN-5775).
  # ============================================================================

  boundary-parity:
    name: Cross-Repo Boundary Parity
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    # Only run when seam-relevant files change
    if: >-
      github.event_name == 'merge_group' ||
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files || '0', '0') == false
    continue-on-error: true
    steps:
      - uses: OmniNode-ai/onex_change_control/.github/actions/validate-boundaries@main
        with:
          checks: "boundary-parity"
          warn-only: "true"

  # ============================================================================
  # CI SUMMARY (OMN-4501) — single branch-protection check
  # Aggregates quality-gate, tests-gate, security-gate into one status context.
  # build is excluded: it is post-gate artifact packaging, not a gating requirement.
  # ============================================================================


  contract-compliance:
    name: Contract Compliance Check
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: Checkout onex_change_control
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/onex_change_control
          path: onex_change_control

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'onex_change_control/uv.lock'

      - name: Install onex_change_control
        working-directory: onex_change_control
        run: uv sync --all-extras

      - name: Validate contract YAML files
        working-directory: onex_change_control
        run: |
          CONTRACTS=$(find "$GITHUB_WORKSPACE/onex_change_control/contracts" -name "OMN-*.yaml" 2>/dev/null)
          if [ -z "$CONTRACTS" ]; then
            echo "No contract YAML files found — skipping validation"
            exit 0
          fi
          uv run validate-yaml $CONTRACTS
        env:
          GH_TOKEN: ${{ github.token }}

  ci-summary:
    name: CI Summary
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: [quality-gate, tests-gate, security-gate, compliance, contract-compliance]
    if: always()
    steps:
      - name: Check all jobs passed
        working-directory: ${{ github.workspace }}
        run: |
          quality="${{ needs.quality-gate.result }}"
          tests="${{ needs.tests-gate.result }}"
          security="${{ needs.security-gate.result }}"
          compliance="${{ needs.compliance.result }}"

          FAILED=false
          for result in "$quality" "$tests" "$security"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              FAILED=true
            fi
          done

          # Compliance: accept success or skipped (command may not exist yet)
          if [[ "$compliance" == "failure" || "$compliance" == "cancelled" ]]; then
            FAILED=true
          fi

          if [[ "$FAILED" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            echo "  Quality Gate: $quality"
            echo "  Tests Gate: $tests"
            echo "  Security Gate: $security"
            echo "  Compliance: $compliance"
            exit 1
          fi
          echo "All required jobs passed"

  # ============================================================================
  # BUILD (downstream of all gates)
  # On PRs and merge_group: build-only validation (no push, no Trivy scan)
  # On push to main: full build + push to GHCR + Trivy vulnerability scan
  # ============================================================================

  build:
    name: Build Docker Image
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    permissions:
      contents: read
      packages: write
      security-events: write
    timeout-minutes: 30
    needs: [quality-gate, tests-gate, security-gate]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deployment/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.event_name != 'merge_group' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Set lowercase image name
        id: image-name
        working-directory: ${{ github.workspace }}
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Export image for scanning
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deployment/Dockerfile
          load: true
          tags: ${{ steps.image-name.outputs.name }}:scan

      - name: Trivy vulnerability scanner (SARIF)
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.34.2 (pinned 2026-03-04)
        with:
          image-ref: ${{ steps.image-name.outputs.name }}:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy vulnerability scanner (table)
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.34.2 (pinned 2026-03-04)
        with:
          image-ref: ${{ steps.image-name.outputs.name }}:scan
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  # ============================================================================
  # DEPLOYMENT
  # ============================================================================

  deploy-staging:
    name: Deploy to Staging
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.omniclaude.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to staging
        working-directory: ${{ github.workspace }}
        run: echo "Deploying to staging environment..."

  deploy-production:
    name: Deploy to Production
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://omniclaude.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to production
        working-directory: ${{ github.workspace }}
        run: echo "Deploying to production environment..."

  ai-slop-check:
    name: AI-Slop Pattern Check (strict, PR diff)
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Compute changed Python/Markdown files vs PR base
        id: changed
        working-directory: ${{ github.workspace }}
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            git fetch origin "${{ github.base_ref }}" --no-tags --depth=1
            FILES=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- '*.py' '*.md' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only HEAD~1 -- '*.py' '*.md' 2>/dev/null | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
      - name: Check changed files for AI-slop patterns (strict)
        working-directory: ${{ github.workspace }}
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          if [ -z "$FILES" ]; then exit 0; fi
          python scripts/validation/check_ai_slop.py --strict $FILES

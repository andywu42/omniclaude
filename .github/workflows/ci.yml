        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432/tcp

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379/tcp

    env:
      # Database environment variables must be available to all steps,
      # not just the test step, to prevent psycopg2 OS-user fallback
      # (which causes "FATAL: role root does not exist" on CI runners)
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DATABASE: test_db
      TEST_PG_DSN: postgresql://test:test@localhost:5432/test_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Export service ports
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "POSTGRES_PORT=${{ job.services.postgres.ports['5432'] }}"
            echo "DATABASE_URL=postgresql://test:test@localhost:${{ job.services.postgres.ports['5432'] }}/test_db"
            echo "TEST_PG_DSN=postgresql://test:test@localhost:${{ job.services.postgres.ports['5432'] }}/test_db"
            echo "REDIS_URL=redis://localhost:${{ job.services.redis.ports['6379'] }}/0"
          } >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load cached venv
        if: ${{ vars.OMNI_ENABLE_VENV_CACHE_RESTORE == 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: |
          uv sync --frozen --group dev
          uv pip install pytest-split pytest-cov

      - name: Auto-generate skill nodes
        working-directory: ${{ github.workspace }}
        run: uv run python scripts/generate_skill_node.py --all

      - name: Run tests
        working-directory: ${{ github.workspace }}
        run: |
          # Run all tests across both directories, split into 5 groups
          # Exit code 5 = no tests collected (expected for some splits)
          set +e
          uv run pytest -o addopts="" tests/ \
            --splits 5 \
            --group ${{ matrix.group }} \
            -v -m "not integration" \
            --cov=src/omniclaude \
            --cov-report=term-missing \
            --junitxml=junit-test-${{ matrix.group }}.xml
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ] && [ $EXIT_CODE -ne 5 ]; then
            echo "::error::Tests failed with exit code $EXIT_CODE"
            exit 1
          fi

          # Rename coverage file to be unique for this group
          mv .coverage .coverage.${{ matrix.group }} 2>/dev/null || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: coverage-test-group-${{ matrix.group }}
          path: .coverage.${{ matrix.group }}
          retention-days: 1

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: test-results-${{ matrix.group }}
          path: junit-test-${{ matrix.group }}.xml


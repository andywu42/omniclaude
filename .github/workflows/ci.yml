  arch-omnidash-db-role:
    name: "Arch: omnidash_readonly role provisioning + CI (check 7)"
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432/tcp
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install PostgreSQL client
        working-directory: ${{ github.workspace }}
        run: |
          if command -v psql >/dev/null 2>&1; then
            exit 0
          fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y postgresql-client
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1 && [ "$(id -u)" -eq 0 ]; then
            apt-get update -qq
            apt-get install -y postgresql-client
            exit 0
          fi
          if command -v docker >/dev/null 2>&1; then
            mkdir -p .ci-bin
            cat > .ci-bin/psql <<'SH'
          #!/usr/bin/env bash
          exec docker run --rm --network host -e PGPASSWORD="${PGPASSWORD:-}" -e PGPORT="${PGPORT:-}" postgres:16-alpine psql "$@"
          SH
            chmod +x .ci-bin/psql
            echo "${PWD}/.ci-bin" >> "$GITHUB_PATH"
            exit 0
          fi
          echo "::error::psql is unavailable and no supported installer or Docker fallback exists"
          exit 1

      - name: Provision omnidash_readonly role and verify permissions
        env:
          PGPASSWORD: postgres
          PGPORT: ${{ job.services.postgres.ports['5432'] }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          # Wait for Postgres to be ready
          for attempt in {1..30}; do
            if psql -h localhost -p "$PGPORT" -U postgres -c '\q'; then
              break
            fi
            echo "Waiting for PostgreSQL on localhost:${PGPORT} (${attempt}/30)..."
            sleep 2
          done
          psql -h localhost -p "$PGPORT" -U postgres -c '\q'

          # Provision omnidash_readonly role
          if ! psql -v ON_ERROR_STOP=1 -h localhost -p "$PGPORT" -U postgres -tAc \
            "SELECT 1 FROM pg_database WHERE datname = 'omnidash_analytics'" \
            | grep -q '^1$'; then
            psql -v ON_ERROR_STOP=1 -h localhost -p "$PGPORT" -U postgres -c \
              "CREATE DATABASE omnidash_analytics"
          fi

          if ! psql -v ON_ERROR_STOP=1 -h localhost -p "$PGPORT" -U postgres -tAc \
            "SELECT 1 FROM pg_roles WHERE rolname = 'omnidash_readonly'" \
            | grep -q '^1$'; then
            psql -v ON_ERROR_STOP=1 -h localhost -p "$PGPORT" -U postgres -c \
              "CREATE ROLE omnidash_readonly WITH LOGIN PASSWORD 'readonly_ci_test'"
          fi

          psql -v ON_ERROR_STOP=1 -h localhost -p "$PGPORT" -U postgres -c \
            "ALTER ROLE omnidash_readonly WITH LOGIN PASSWORD 'readonly_ci_test'"

          psql -v ON_ERROR_STOP=1 -h localhost -p "$PGPORT" -U postgres <<'SQL'
            -- Grant SELECT-only on omnidash_analytics
            GRANT CONNECT ON DATABASE omnidash_analytics TO omnidash_readonly;
          SQL

          # Connect to omnidash_analytics and set up schema permissions
          psql -v ON_ERROR_STOP=1 -h localhost -p "$PGPORT" -U postgres -d omnidash_analytics <<'SQL'
            -- Grant usage on public schema
            GRANT USAGE ON SCHEMA public TO omnidash_readonly;
            -- Grant SELECT on all current tables
            GRANT SELECT ON ALL TABLES IN SCHEMA public TO omnidash_readonly;
            -- Grant SELECT on future tables
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO omnidash_readonly;
          SQL

          echo "omnidash_readonly role provisioned successfully"

          # Verify: omnidash_readonly has SELECT but NOT INSERT/UPDATE/DELETE
          psql -v ON_ERROR_STOP=1 -h localhost -p "$PGPORT" -U postgres -d omnidash_analytics -c \
            "DROP TABLE IF EXISTS public.ci_permission_test"
          psql -v ON_ERROR_STOP=1 -h localhost -p "$PGPORT" -U postgres -d omnidash_analytics -c \
            "CREATE TABLE public.ci_permission_test (id serial PRIMARY KEY, data text)"
          psql -v ON_ERROR_STOP=1 -h localhost -p "$PGPORT" -U postgres -d omnidash_analytics -c \
            "INSERT INTO public.ci_permission_test (data) VALUES ('ci_test_row')"
          psql -v ON_ERROR_STOP=1 -h localhost -p "$PGPORT" -U postgres -d omnidash_analytics -c \
            "GRANT SELECT ON public.ci_permission_test TO omnidash_readonly"
          psql -v ON_ERROR_STOP=1 -h localhost -p "$PGPORT" -U postgres -d omnidash_analytics -tAc \
            "SELECT to_regclass('public.ci_permission_test')" | grep -q '^ci_permission_test$'

          # Verify SELECT works for readonly role
          PGPASSWORD=readonly_ci_test psql -h localhost -p "$PGPORT" -U omnidash_readonly -d omnidash_analytics -c \
            "SELECT * FROM public.ci_permission_test;" > /dev/null && echo "SELECT: OK"

          # Verify INSERT is denied for readonly role
          if PGPASSWORD=readonly_ci_test psql -h localhost -p "$PGPORT" -U omnidash_readonly -d omnidash_analytics -c \
            "INSERT INTO public.ci_permission_test (data) VALUES ('should_fail');" > /tmp/omnidash_readonly_insert.out 2>&1; then
            echo "FAIL: INSERT should be denied for omnidash_readonly"
            exit 1
          fi
          grep -q "permission denied" /tmp/omnidash_readonly_insert.out && echo "INSERT denied: OK"

          # Verify UPDATE is denied for readonly role
          if PGPASSWORD=readonly_ci_test psql -h localhost -p "$PGPORT" -U omnidash_readonly -d omnidash_analytics -c \
            "UPDATE public.ci_permission_test SET data = 'should_fail';" > /tmp/omnidash_readonly_update.out 2>&1; then
            echo "FAIL: UPDATE should be denied for omnidash_readonly"
            exit 1
          fi
          grep -q "permission denied" /tmp/omnidash_readonly_update.out && echo "UPDATE denied: OK"

          # Verify DELETE is denied for readonly role
          if PGPASSWORD=readonly_ci_test psql -h localhost -p "$PGPORT" -U omnidash_readonly -d omnidash_analytics -c \
            "DELETE FROM public.ci_permission_test;" > /tmp/omnidash_readonly_delete.out 2>&1; then
            echo "FAIL: DELETE should be denied for omnidash_readonly"
            exit 1
          fi
          grep -q "permission denied" /tmp/omnidash_readonly_delete.out && echo "DELETE denied: OK"

          echo "omnidash_readonly role: SELECT-only permissions verified"

          # Verify zero access to omniclaude databases (no CONNECT granted)
          # omniclaude DB is postgres (default) in this CI environment
          PGPASSWORD=readonly_ci_test psql -h localhost -p "$PGPORT" -U omnidash_readonly -d postgres -c '\q' 2>&1 \
            | grep -q "permission denied\|FATAL" && echo "omniclaude DB access denied: OK" \
            || echo "NOTE: omniclaude DB isolation not enforced in this CI environment (honor system)"

          echo "omnidash_readonly DB role CI check PASSED"


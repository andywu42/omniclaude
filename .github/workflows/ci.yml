name: CI

# Consolidated CI pipeline for OmniClaude (OMN-2228)
# Replaces ci-cd.yml + enhanced-ci.yml into a single workflow
# with gate aggregators per CI/CD Standards v2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.12'
  UV_HTTP_TIMEOUT: '300'
  # ONEX state directory — required by hooks/lib/onex_state.py (OMN-5632)
  ONEX_STATE_DIR: /tmp/onex-state

jobs:
  # ============================================================================
  # QUALITY CHECKS
  # ============================================================================

  quality:
    name: Code Quality
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load cached venv
        if: ${{ vars.OMNI_ENABLE_VENV_CACHE_RESTORE == 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: uv sync --frozen --group dev

      - name: Ruff format check
        working-directory: ${{ github.workspace }}
        run: uv run ruff format --check src/ tests/

      - name: Ruff lint
        working-directory: ${{ github.workspace }}
        run: uv run ruff check src/ tests/

      - name: Mypy type checking
        working-directory: ${{ github.workspace }}
        run: |
          # Phase 1: Non-blocking (report errors but don't fail CI)
          # Phase 2: Fix errors and make blocking (TODO: remove || true)
          # TODO(OMN-XXXX): Make mypy blocking in Phase 2
          uv run mypy src/ --config-file mypy.ini 2>&1 | tee mypy-output.txt || true
          ERROR_COUNT=$(grep -c "error:" mypy-output.txt 2>/dev/null || echo "0")
          echo "MyPy Summary: $ERROR_COUNT type errors found"
          if [ "$ERROR_COUNT" -gt "0" ]; then
            echo "MyPy found $ERROR_COUNT type errors (non-blocking for now)"
          fi

  docs-links:
    name: Markdown Link Check
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Detect whether any *.md files changed (path filter to avoid noise on code-only PRs)
      - name: Check for changed markdown files
        id: md-changed
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.md

      - name: Check markdown links
        # On PRs: only run when *.md files changed. On push to main/develop: always run.
        if: github.event_name == 'push' || steps.md-changed.outputs.any_changed == 'true'
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --no-progress
            --exclude 'https://linear\.app'
            --exclude 'https://github\.com/OmniNode-ai'
            --exclude 'https://github\.com/fastapi'
            --exclude 'https://stackoverflow\.com'
            --exclude 'https://staging\.omniclaude\.example\.com'
            --exclude 'https://omniclaude\.example\.com'
            --exclude 'http://localhost'
            --exclude 'https://www\.gnu\.org'
            --exclude 'https://www\.contributor-covenant\.org'
            --exclude 'https://claude\.ai'
            --exclude 'https://freedesktop\.org'
            --exclude 'https://www\.freedesktop\.org'
            --exclude 'https://github\.com/fastapi'
            --exclude 'https://stackoverflow\.com'
            --exclude 'https://dash\.dev\.omninode\.ai'
            --accept 200..=299,429,503
            '**/*.md'
          fail: true

  pyright:
    name: Pyright Type Checking
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load cached venv
        if: ${{ vars.OMNI_ENABLE_VENV_CACHE_RESTORE == 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: uv sync --frozen --group dev

      - name: Pyright
        working-directory: ${{ github.workspace }}
        run: uv run pyright src/omniclaude

  check-handshake:
    name: Architecture Handshake
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout omnibase_core
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omnibase_core
          path: omnibase_core

      - name: Verify handshake is current
        working-directory: ${{ github.workspace }}
        run: ./omnibase_core/architecture-handshakes/check-handshake.sh ./omnibase_core

  enum-governance:
    name: Enum Governance
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load cached venv
        if: ${{ vars.OMNI_ENABLE_VENV_CACHE_RESTORE == 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: uv sync --frozen --group dev

      - name: Validate enum governance
        working-directory: ${{ github.workspace }}
        run: uv run python scripts/validation/validate_enum_governance.py

  exports-validation:
    name: Exports Validation
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load cached venv
        if: ${{ vars.OMNI_ENABLE_VENV_CACHE_RESTORE == 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: uv sync --frozen --group dev

      - name: Validate exports
        working-directory: ${{ github.workspace }}
        run: uv run python scripts/validation/validate_exports.py

  env-var-registry:
    name: "Env Var Registry (OMN-6263)"
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check env var registry completeness
        working-directory: ${{ github.workspace }}
        run: |
          echo "================================================================"
          echo "Env Var Registry: os.getenv refs vs .env.example (OMN-6263)"
          echo "================================================================"
          python scripts/ci/check_env_var_registry.py \
            --scan-dirs src/omniclaude plugins/onex/hooks/lib \
            --registry .env.example \
            --allowlist-file .env.allowlist \
            --format text

  cross-repo-validation:
    name: Kafka Import Guard
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load cached venv
        if: ${{ vars.OMNI_ENABLE_VENV_CACHE_RESTORE == 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: uv sync --frozen --group dev

      - name: Kafka import guard
        working-directory: ${{ github.workspace }}
        run: uv run python -m omnibase_core.validation.cross_repo --policy .cross-repo-policy.yaml

  migration-freeze:
    name: Migration Freeze
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check migration freeze
        working-directory: ${{ github.workspace }}
        run: ./scripts/check_migration_freeze.sh --ci
        env:
          MIGRATION_CHECK_BASE: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          MIGRATION_FREEZE_BYPASS: ${{ contains(github.event.pull_request.labels.*.name, 'db-split-bypass') && 'true' || '' }}

  onex-validation:
    name: ONEX Compliance
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: uv sync --frozen

      - name: Validate ONEX naming conventions
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          NODE_FILES=$(find src/omniclaude/ -name "node_*.py" -type f 2>/dev/null || true)
          if [ -z "$NODE_FILES" ]; then
            echo "No ONEX node files found -- skipping (expected for schema-only phase)"
            exit 0
          fi
          FAILED=false
          while read -r file; do
            if [[ "$file" == *"_effect.py" ]] && ! grep -q "class Node.*Effect" "$file"; then
              echo "ERROR: $file should define class Node<Name>Effect"
              FAILED=true
            fi
            if [[ "$file" == *"_compute.py" ]] && ! grep -q "class Node.*Compute" "$file"; then
              echo "ERROR: $file should define class Node<Name>Compute"
              FAILED=true
            fi
            if [[ "$file" == *"_reducer.py" ]] && ! grep -q "class Node.*Reducer" "$file"; then
              echo "ERROR: $file should define class Node<Name>Reducer"
              FAILED=true
            fi
            if [[ "$file" == *"_orchestrator.py" ]] && ! grep -q "class Node.*Orchestrator" "$file"; then
              echo "ERROR: $file should define class Node<Name>Orchestrator"
              FAILED=true
            fi
          done <<< "$NODE_FILES"
          if [ "$FAILED" = "true" ]; then exit 1; fi
          echo "All ONEX naming conventions validated"

      - name: Validate ONEX contracts
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          NODE_FILES=$(find src/omniclaude/ -name "node_*.py" -type f 2>/dev/null || true)
          if [ -z "$NODE_FILES" ]; then
            echo "No ONEX node files found -- skipping"
            exit 0
          fi
          while read -r file; do
            if ! grep -q "ModelContract" "$file" 2>/dev/null; then
              echo "WARNING: $file may be missing ModelContract usage"
            fi
          done <<< "$NODE_FILES"
          echo "Contract validation completed"

      - name: Validate ONEX method signatures
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          EFFECT_FILES=$(find src/omniclaude/ -name "*_effect.py" -type f 2>/dev/null || true)
          if [ -z "$EFFECT_FILES" ]; then
            echo "No ONEX Effect node files found -- skipping"
            exit 0
          fi
          while read -r file; do
            if grep -q "class Node.*Effect" "$file" && ! grep -q "async def execute_effect" "$file"; then
              echo "WARNING: $file Effect node should implement async def execute_effect()"
            fi
          done <<< "$EFFECT_FILES"
          echo "Method signature validation completed"

  # ============================================================================
  # ARCHITECTURE ENFORCEMENT (OMN-2592 — Wave 0 prerequisite)
  # These 11 checks must all be green before any feature branch can merge.
  # They enforce architectural invariants: no DB in orchestrators, no direct
  # Kafka producers, no naive UTC datetimes, and topic naming conventions.
  # ============================================================================

  arch-no-db-in-orchestrator:
    name: "Arch: No DB access in orchestrator/compute (checks 1 & 8)"
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check no DB access in orchestrator/compute (static)
        working-directory: ${{ github.workspace }}
        run: python3 scripts/validation/validate_no_db_in_orchestrator.py

  arch-no-git-outside-effects:
    name: "Arch: No git/gh calls outside effects (check 2)"
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check no git/gh subprocess calls outside effects
        working-directory: ${{ github.workspace }}
        run: python3 scripts/validation/validate_no_git_outside_effects.py

  arch-no-linear-outside-effects:
    name: "Arch: No LinearClient outside effects (check 3)"
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check no LinearClient outside effects
        working-directory: ${{ github.workspace }}
        run: python3 scripts/validation/validate_no_linear_outside_effects.py

  arch-no-repo-adapter-in-orchestrator:
    name: "Arch: No repository adapter imports in orchestrator/compute (check 4)"
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check no repository adapter imports in orchestrator/compute
        working-directory: ${{ github.workspace }}
        run: python3 scripts/validation/validate_no_repo_adapter_in_orchestrator.py

  arch-no-direct-adapter-in-business-logic:
    name: "Arch: No direct adapter imports in business logic (check 13)"
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check no direct adapter imports in runners/skills
        working-directory: ${{ github.workspace }}
        run: python3 scripts/validation/validate_no_direct_adapter_in_business_logic.py

  arch-no-direct-bus-instantiation:
    name: "Arch: No direct EventBus instantiation (OMN-10725)"
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check no direct EventBus instantiation outside DI bootstrap
        working-directory: ${{ github.workspace }}
        run: python3 scripts/validation/validate_no_direct_bus_instantiation.py

  arch-no-raw-sqlite3-in-handlers:
    name: "Arch: No raw sqlite3.connect in handler/skill code (OMN-10725)"
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check no raw sqlite3.connect in handler/skill code
        working-directory: ${{ github.workspace }}
        run: python3 scripts/validation/validate_no_raw_sqlite3.py

  arch-no-env-fallbacks:
    name: "Arch: No localhost/default env fallbacks (OMN-10734)"
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-

# Agent Config Schema Validation (OMN-8910)
#
# Validates all agent configuration YAMLs against ModelAgentConfig from
# onex_change_control. Runs on PRs that touch agent config files and on
# merge_group events.
#
# Required status check: "validate-agent-configs"

name: Validate Agent Configs

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "plugins/onex/agents/configs/**/*.yaml"
  merge_group:
  workflow_dispatch:

concurrency:
  group: validate-agent-configs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-agent-configs:
    name: validate-agent-configs
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout omniclaude
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Checkout onex_change_control
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/onex_change_control
          path: _onex_change_control
          token: ${{ github.token }}

      - name: Install onex_change_control
        working-directory: ${{ github.workspace }}
        run: |
          cd _onex_change_control
          uv pip install --system .

      - name: Validate agent configs
        working-directory: ${{ github.workspace }}
        run: |
          validate-agent-yaml plugins/onex/agents/configs/*.yaml

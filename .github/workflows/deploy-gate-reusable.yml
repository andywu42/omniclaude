#
# Reusable workflow: deploy-gate validator (DGM-Phase6, OMN-9734).
# Canonical source — all repos call this via uses: instead of running
# their own copy of validate_pr_deploy_required.py.
#
# Canonical validator: OMN-9685 (omnibase_core PR #902, 2026-04-25).
# Centralised: OMN-9734 (DGM-Phase6). Supersedes DGM-Phase2.
# OCC contract resolution: OMN-11423 — contracts read from onex_change_control, not caller repo.
#
# Usage in caller repos:
#   jobs:
#     deploy-gate:
#       uses: OmniNode-ai/omniclaude/.github/workflows/deploy-gate-reusable.yml@main
#       secrets: inherit

name: Deploy Gate (reusable)

on:
  workflow_call:
    inputs:
      pr-number:
        description: PR number to validate (defaults to github.event.pull_request.number)
        type: number
        required: false
        default: 0
      contracts-dir:
        description: >
          Deprecated (OMN-11423). Contracts are now read from onex_change_control;
          this input is ignored. Remove it from your caller workflow.
        type: string
        required: false
        default: contracts

jobs:
  deploy-gate:
    name: deploy-gate
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 25

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6

      - name: Checkout onex_change_control contracts (canonical contract source)
        if: github.event_name != 'merge_group'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OCC_REF: dev
          OCC_REPO_URL: https://github.com/OmniNode-ai/onex_change_control.git
        run: |
          set -euo pipefail

          git_auth_header="AUTHORIZATION: bearer ${GH_TOKEN}"
          retry_delays=(0 10 20 30 45)

          for index in "${!retry_delays[@]}"; do
            attempt=$((index + 1))
            delay="${retry_delays[$index]}"

            if [ "$delay" -gt 0 ]; then
              echo "::notice::Retrying OCC contracts checkout in ${delay}s (attempt ${attempt}/${#retry_delays[@]})"
              sleep "$delay"
            fi

            rm -rf _occ
            git init _occ
            git -C _occ remote add origin "$OCC_REPO_URL"
            git -C _occ sparse-checkout init --cone
            git -C _occ sparse-checkout set contracts

            if timeout 90 git -C _occ \
                -c http.version=HTTP/1.1 \
                -c "http.https://github.com/.extraheader=${git_auth_header}" \
                fetch --depth=1 --filter=blob:none origin "$OCC_REF" \
              && git -C _occ checkout --force FETCH_HEAD \
              && test -d _occ/contracts; then
              echo "::notice::OCC contracts checkout succeeded on attempt ${attempt}"
              exit 0
            fi

            echo "::warning::OCC contracts checkout attempt ${attempt}/${#retry_delays[@]} failed"
          done

          echo "::error::OCC contracts checkout failed after ${#retry_delays[@]} attempts"
          exit 1

      - name: Skip on merge_group
        if: github.event_name == 'merge_group'
        working-directory: ${{ github.workspace }}
        run: |
          echo "::notice::deploy-gate: merge_group event — skipped (validated on PR branch)."

      - name: Run deploy gate (canonical composite action)
        if: github.event_name != 'merge_group'
        uses: OmniNode-ai/omniclaude/.github/actions/deploy-gate@main
        with:
          pr-number: ${{ inputs.pr-number != 0 && inputs.pr-number || github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          contracts-dir: _occ/contracts

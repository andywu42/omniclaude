#
# OMN-8837: Poll for CLEAN+armed PRs that missed the auto-merge event trigger.
# auto-merge.yml only fires on fresh events; a PR that becomes CLEAN while no
# event is in flight sits stuck indefinitely. This workflow runs every 15 minutes
# and calls enqueuePullRequest (GraphQL) on any PR that is CLEAN, has an
# autoMergeRequest set, and is not already in the merge queue.
name: Auto-Merge Stale Poller

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  poll-and-enqueue:
    name: Enqueue Stale CLEAN+Armed PRs
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Enqueue stale CLEAN+armed PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          OWNER="${GH_REPO%%/*}"
          REPO="${GH_REPO##*/}"

          # Fetch all open PRs with merge state, auto-merge, and merge queue status
          # Paginate via cursor until hasNextPage is false
          ALL_NODES="[]"
          CURSOR=""
          while true; do
            if [ -n "$CURSOR" ]; then
              PAGE=$(gh api graphql \
                -f query='query($owner: String!, $repo: String!, $after: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequests(states: OPEN, first: 100, after: $after) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        number id
                        author { login }
                        mergeStateStatus
                        autoMergeRequest { mergeMethod }
                        isInMergeQueue isDraft
                      }
                    }
                  }
                }' -f owner="$OWNER" -f repo="$REPO" -f after="$CURSOR")
            else
              PAGE=$(gh api graphql \
                -f query='query($owner: String!, $repo: String!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequests(states: OPEN, first: 100) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        number id
                        author { login }
                        mergeStateStatus
                        autoMergeRequest { mergeMethod }
                        isInMergeQueue isDraft
                      }
                    }
                  }
                }' -f owner="$OWNER" -f repo="$REPO")
            fi
            ALL_NODES=$(echo "$ALL_NODES $PAGE" | jq -s '.[0] + [.[1].data.repository.pullRequests.nodes[]]')
            HAS_NEXT=$(echo "$PAGE" | jq -r '.data.repository.pullRequests.pageInfo.hasNextPage')
            [ "$HAS_NEXT" = "true" ] || break
            CURSOR=$(echo "$PAGE" | jq -r '.data.repository.pullRequests.pageInfo.endCursor')
          done

          echo "$ALL_NODES" | jq -r '
            .[] |
            select(
              .author.login == "jonahgabriel" and
              .mergeStateStatus == "CLEAN" and
              .autoMergeRequest != null and
              .isInMergeQueue == false and
              .isDraft == false
            ) |
            "\(.number) \(.id)"
          ' | while read -r PR_NUMBER NODE_ID; do
            echo "Enqueueing PR #$PR_NUMBER (node: $NODE_ID)"
            RESULT=$(gh api graphql -f query='
              mutation($prId: ID!) {
                enqueuePullRequest(input: { pullRequestId: $prId }) {
                  mergeQueueEntry {
                    id
                    position
                  }
                }
              }
            ' -f prId="$NODE_ID" 2>&1)
            ENQUEUE_EXIT=$?

            if echo "$RESULT" | grep -q '"id"'; then
              POSITION=$(echo "$RESULT" | jq -r '.data.enqueuePullRequest.mergeQueueEntry.position // "?"')
              echo "PR #$PR_NUMBER enqueued at position $POSITION"
            elif echo "$RESULT" | grep -qiE "already in the queue|already enqueued"; then
              echo "PR #$PR_NUMBER already in queue (race condition tolerated)"
            else
              echo "ERROR: PR #$PR_NUMBER enqueue failed (exit $ENQUEUE_EXIT): $RESULT" >&2
              exit 1
            fi
          done

          echo "Stale poller complete"

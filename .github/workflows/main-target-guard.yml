#
# OMN-12243: Block PRs targeting main unless they are promotion PRs
# from dev/promotion branches with a promotion receipt.
# OMN-12477: Removed the hotfix/* bypass — main accepts only dev/promotion.
name: Main target guard
on:
  pull_request:
    types: [opened, edited, synchronize]
permissions:
  contents: read
jobs:
  main-target-guard:
    name: main-target-guard
    runs-on: >-
      ${{

        (github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    steps:
      - name: Check PR target branch
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if [[ "${BASE_REF}" != "main" ]]; then
            echo "::notice::PR targets '${BASE_REF}', not main; guard does not apply."
            exit 0
          fi

          echo "PR targets main. Checking head ref: '${HEAD_REF}'"

          if [[ "${HEAD_REF}" == "dev" || "${HEAD_REF}" == promotion/* ]]; then
            if echo "${PR_BODY}" | grep -qE 'promotion-receipt:[[:space:]]*OCC-[0-9]+'; then
              echo "::notice::Promotion PR from '${HEAD_REF}' with valid promotion-receipt. Allowed."
              exit 0
            fi

            echo "::error::Promotion PR from '${HEAD_REF}' is missing a promotion receipt."
            echo "::error::Add a line matching: promotion-receipt: OCC-<number>"
            echo "::error::Retarget this PR to dev; main accepts only promotion PRs."
            exit 1
          fi

          echo "::error::PRs targeting main must come from dev or promotion/*."
          echo "::error::Head ref '${HEAD_REF}' is not permitted to target main directly."
          echo "::error::Retarget this PR to dev; main accepts only promotion PRs."
          exit 1

#
# OMN-10347 (extends OMN-9730 DGM-Phase4): Reusable workflow — mechanical block
# on ALL [skip-*] bypass tokens (not just [skip-deploy-gate:]).
# Called from each repo via:
#
#   jobs:
#     call-reject-skip-token:
#       uses: OmniNode-ai/omniclaude/.github/workflows/reject-deploy-gate-skip.yml@main
#
# OMN-10422: Added merge_group trigger with explicit PR resolution.
# On merge_group, github.event.pull_request is null; the workflow resolves the PR
# from the queue head ref when GitHub exposes a pr-<number> segment.
# Cache is disabled on this job (invariant I9).
#
# This is a REQUIRED status check. PRs containing any [skip-*] bypass token
# cannot merge unless an explicit approval receipt (# skip-token-allowed: <id>) is present.
#
# CLAUDE.md Rule #10: Never bypass local gates.
# Plan: omni_home/docs/plans/2026-04-25-deploy-gate-matcher-narrowing.md Phase 4

name: Reject skip-gate bypass tokens

on:
  workflow_call:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  merge_group:

jobs:
  scan-skip-tokens:
    name: scan / reject-skip-gate-token
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve PR number
        id: resolve-pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
          MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "merge_group" ]]; then
            HEAD_REF="${MERGE_GROUP_HEAD_REF:-}"
            PR_NUMBER_FROM_REF=""
            if [[ "${HEAD_REF}" =~ (^|/)pr-([0-9]+)- ]]; then
              PR_NUMBER_FROM_REF="${BASH_REMATCH[2]}"
            fi
            printf 'pr_number=%s\n' "${PR_NUMBER_FROM_REF}" >> "${GITHUB_OUTPUT}"
          else
            printf 'pr_number=%s\n' "${PR_NUMBER:-}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Scan all PR surfaces for skip-gate bypass tokens
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          # OMN-10347: Broadened from [skip-deploy-gate: to ALL [skip-* tokens.
          # OMN-10969: Extended to scan PR title, commit messages, and changed file diff.
          SKIP_PATTERN='\[skip-[a-zA-Z]'
          ALLOWLIST_PATTERN='#[[:space:]]*skip-token-allowed:[[:space:]]*[^[:space:]]'
          RULE_REF="CLAUDE.md Rule #10 + docs/plans/2026-04-25-deploy-gate-matcher-narrowing.md Phase 4"
          TICKET_REF="OMN-10969"

          VIOLATIONS=()

          # ── Collect all surfaces ──────────────────────────────────────────────

          # Surface 1: PR body
          BODY="${PR_BODY:-}"
          if [[ -z "${BODY}" ]] && [[ -n "${PR_NUMBER:-}" ]]; then
            BODY=$(gh pr view "${PR_NUMBER}" --json body --jq .body 2>/dev/null || true)
          fi

          TITLE=""
          COMMIT_MESSAGES=""
          DIFF=""

          if [[ -n "${PR_NUMBER:-}" ]]; then
            # Surface 2: PR title
            TITLE="${PR_TITLE:-}"
            if [[ -z "${TITLE}" ]]; then
              TITLE=$(gh pr view "${PR_NUMBER}" --json title --jq .title 2>/dev/null || true)
            fi

            # Surface 3: Commit messages in the PR
            COMMIT_MESSAGES=$(gh pr view "${PR_NUMBER}" --json commits --jq '[.commits[].messageHeadline] | join("\n")' 2>/dev/null || true)

            # Surface 4: Changed file diff
            # Only scan PR-body-like file types (md, yaml, yml, txt) to avoid
            # false positives on source code that legitimately discusses skip tokens
            # (validators, tests, docs). The pre-commit hook applies the same filter.
            # Filter on filename headers ("+++ b/file.ext") then include following added lines.
            BASE_REF="${GITHUB_BASE_REF:-main}"
            DIFF=$(git diff "origin/${BASE_REF}...HEAD" -- '*.md' '*.yaml' '*.yml' '*.txt' | grep '^+' || true)
          else
            echo "::notice::No PR number available — skipping title, commit, and diff scans."
          fi

          # ── PR-wide allowlist receipt check ──────────────────────────────────
          # The receipt is PR-wide: if ANY surface contains skip-token-allowed,
          # the entire PR is allowed (with friction logged). This prevents a single
          # surface from blocking when a receipt exists elsewhere in the PR.
          FULL_PR_PAYLOAD="$(printf '%s\n%s\n%s' "${BODY}" "${TITLE}" "${COMMIT_MESSAGES}")"

          RECEIPT_PRESENT=false
          if echo "$FULL_PR_PAYLOAD" | grep -qiE "$ALLOWLIST_PATTERN"; then
            RECEIPT_PRESENT=true
          fi

          # ── Per-surface skip-token scan ───────────────────────────────────────
          check_surface() {
            local surface_name="$1"
            local content="$2"

            if [[ -z "$content" ]]; then
              return
            fi

            if echo "$content" | grep -qiE "$SKIP_PATTERN"; then
              if [[ "$RECEIPT_PRESENT" == "true" ]]; then
                echo "::warning::$surface_name contains a [skip-*] token but a PR-wide approval receipt (skip-token-allowed) is present. Allowed with friction logged."
              else
                VIOLATIONS+=("$surface_name")
              fi
            fi
          }

          check_surface "PR body" "${BODY}"
          check_surface "PR title" "${TITLE}"
          check_surface "commit messages" "${COMMIT_MESSAGES}"
          check_surface "changed file diff" "${DIFF}"

          # ── Report ────────────────────────────────────────────────────────────
          if [[ "${#VIOLATIONS[@]}" -gt 0 ]]; then
            for surface in "${VIOLATIONS[@]}"; do
              echo "::error::$surface contains a [skip-*] bypass token."
            done
            echo "::error::Per $RULE_REF, bypass is not permitted without explicit user approval."
            echo "::error::Fix the gate properly:"
            echo "::error::  1. Add dod_evidence with type: no_deployable_artifact (preferred)"
            echo "::error::  2. Narrow path patterns in validate_pr_deploy_required.py"
            echo "::error::  3. If truly exceptional: add '# skip-token-allowed: <receipt-id>' with a traceable approval receipt"
            echo "::error::Ticket: $TICKET_REF"
            exit 1
          fi

          echo "::notice::No [skip-*] bypass tokens found in any scanned surface (body, title, commits, diff). OK."

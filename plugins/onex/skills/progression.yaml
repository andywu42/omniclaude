# Skill Progression Graph (OMN-3455)
#
# Defines which skills "unlock" which other skills based on usage history.
# SessionStart reads ~/.claude/onex-skill-usage.log and injects 1-2 suggestions
# when the user has used a `from` skill at least `after_uses` times without
# having used the `to` skill yet.
#
# Validation: All `from` and `to` values must correspond to actual skill names.
# The deploy-local-plugin validator rejects dead references at deploy time.

progressions:
  # Core workflow ladder: local review → PR polish
  - from: local_review
    to: pr_polish
    after_uses: 5

  # Core workflow ladder: ticket-work → ticket-pipeline
  - from: ticket_work
    to: ticket_pipeline
    after_uses: 3

  # ticket-pipeline → epic-team (scale to multi-ticket workflows)
  - from: ticket_pipeline
    to: epic_team
    after_uses: 5

  # local-review → ultimate-validate (deeper quality validation)
  - from: local_review
    to: ultimate_validate
    after_uses: 10

  # pr-watch → merge-sweep (bulk PR management)
  - from: pr_watch
    to: merge_sweep
    after_uses: 5

  # design-to-plan → plan-to-tickets (convert plans to Linear tickets)
  - from: design_to_plan
    to: plan_to_tickets
    after_uses: 3

  # ci-watch → ci-fix-pipeline (automated CI repair)
  - from: ci_watch
    to: ci_fix_pipeline
    after_uses: 3

---
# Skill backing-node liveness validator allowlist (OMN-10052).
#
# Each entry exempts a single skill from ``validate_skill_backing_node``.
# Every entry MUST carry a non-empty ``reason`` string explaining WHY the
# skill is allowed to declare a backing node that does not pass liveness
# checks.  The loader rejects blank or missing reasons.
#
# Adding a skill here is a deliberate ownership statement.  Drop-in
# additions to silence the gate are not allowed and will be caught in
# code review.
#
# Schema:
#   allowlist:
#     - skill: <directory name under plugins/onex/skills/>
#       reason: <free-text justification, non-empty>

allowlist:
  - skill: verified_dispatch
    reason: >
      Backing node node_verified_dispatch_orchestrator lives in omnimarket repo (PR #695),
      not in omniclaude. CI does not check out omnimarket when validating omniclaude skills,
      so liveness validation fails cross-repo. Node existence and liveness are verified by
      the omnimarket PR CI. This allowlist entry will be removed once cross-repo checkout
      is wired (OMN-11220).
  - skill: shim_audit
    reason: >
      Backing node node_shim_scanner lives in omnimarket repo (OMN-4419, PR #945).
      CI does not check out omnimarket when validating omniclaude skills, so liveness
      validation fails cross-repo. Node existence and liveness are verified by the
      omnimarket PR CI. This allowlist entry will be removed once cross-repo checkout
      is wired (OMN-11220).

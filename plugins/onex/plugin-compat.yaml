#
# plugin-compat.yaml — OmniClaude / ONEX Plugin Compatibility Matrix
#
# Schema rules (§ 7.3 — CI-enforced):
#   1. Topic names are immutable once published. Append `.v2` for breaking changes.
#   2. ModelXxxCommand fields may be added (backward-compatible).
#   3. Fields may NOT be renamed or removed without a .v2 topic.
#   4. ProtocolNodeReceipt fields may be added.
#   5. Plugin CI validates compatibility metadata shape and version-window ordering.
#      Runtime handshake enforcement is performed by the omnimarket runtime loader.
#
# Read by: omnimarket.runtime.version_handshake.load_compat_matrix()
# CI gate:  .github/workflows/plugin-compat-gate.yml (omniclaude)
#           .github/workflows/plugin-compat-gate.yml (omnimarket)
#
# OMN-8789: SD-02

plugin: onex
plugin_version: "0.23.0"

# Compatibility window: plugin works with runtimes in [min, max).
# max_runtime_version is exclusive (semver ~= semantics per § 7.3).
min_runtime_version: "0.2.0"
max_runtime_version: "1.0.0"

# Per-node topic and schema_version declarations for all R-class nodes.
# schema_version tracks the Kafka message schema version for each topic.
# "v1" → first published schema; increment with .v2 topic on breaking change.

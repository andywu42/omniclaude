# PostToolUse Hook Configuration
# Controls quality enforcement and pattern tracking

# Auto-fix configuration
autofix:
  enabled: false  # Disable auto-fix for now - just pass through
  max_corrections_per_file: 10

# Pattern tracking configuration
pattern_tracking:
  enabled: false  # Disable pattern tracking for now
  fail_gracefully: true

# Naming validation configuration
naming_validation:
  enabled: false  # Disable naming validation for now

# Quorum scoring configuration
quorum:
  enabled: false  # Disable AI quorum scoring

# Pattern enforcement advisory (OMN-2263)
# Queries pattern store, checks session cooldown, outputs advisory JSON.
# Gated behind env vars ENABLE_LOCAL_INFERENCE_PIPELINE + ENABLE_PATTERN_ENFORCEMENT.
pattern_enforcement:
  enabled: false  # Also gated by env vars - both must be true
  budget_ms: 300
  min_confidence: 0.7
  max_patterns: 10

# Hook policy approval-gating (OMN-4383)
# Controls enforcement behavior for forbidden commands.
#
# mode options:
#   hard     - block unconditionally, no override possible (default, fail-safe)
#   soft     - block but allow one-time human override via approval channel
#   advisory - allow but include advisory message in response
#   disabled - fully disabled, command passes through
#
# channel options (only meaningful when mode: soft):
#   terminal   - FULLY IMPLEMENTED: human runs allow-no-verify "reason" <session_prefix>
#   chat       - PROCEDURALLY DEFINED: agent calls allow_flag.py after user approves in chat
#                (agent-side approval wiring requires a future implementation ticket)
#   slack_poll - STUB ONLY: background Slack listener daemon (follow-up ticket required)

hook_policies:
  no_verify:
    mode: hard        # Change to 'soft' to enable override path; default stays hard
    channel: terminal # terminal | chat | slack_poll (see maturity notes above)

# Delegation enforcement
# Controls when inline work is warned/blocked to force general-purpose agent delegation.
# All thresholds count tool calls since last delegation (Task/Agent with onex: prefix).
# A new user prompt resets all counters and flags.
# Set any threshold to -1 to disable that check.
#
# Precedence: skill_loaded thresholds override normal thresholds whenever
# the skill-loaded flag exists and no delegation has occurred, even if the
# corresponding normal threshold is disabled (-1).
delegation_enforcement:
  # Thresholds raised [OMN-9140] — prior tight values (write_block=5, total=15,
  # skill_loaded write=2/read=3/total=4) recursively trapped sessions. Generous
  # defaults keep enforcement advisory while the sub-agent exemption and
  # kill-switch (OMNICLAUDE_HOOKS_DISABLE=1) provide safe escape hatches.
  # Write/modify tools (Write, Edit, MultiEdit, Bash-that-mutates)
  write_warn_threshold: 100     # advisory warning (fires once per turn)
  write_block_threshold: 500    # hard block (exit 2)

  # Read-only tools (Read, Glob, Grep, WebFetch, WebSearch, Bash-that-reads)
  read_warn_threshold: 200      # advisory warning
  read_block_threshold: 1000    # hard block — closes the "unlimited reads" gap

  # Combined (read + write)
  total_block_threshold: 1500   # hard block on total tool calls

  # Stricter thresholds when a Skill was loaded but no delegation happened.
  # Overrides normal thresholds unconditionally when the skill-loaded flag exists.
  skill_loaded:
    write_block_threshold: 300
    read_block_threshold: 500
    total_block_threshold: 1000

  # Minimum tool calls referenced in the delegation rule text (UserPromptSubmit)
  delegation_rule_tool_threshold: 2

  # Bash command patterns classified as read-only (extended regex, matched with grep -E).
  # Best-effort classification only. Compound commands (&&, ;, |, redirects) that contain
  # ANY non-whitelisted component default to non-read-only. Patterns are anchored to the
  # start of the FIRST simple command only — shell composition after a whitelisted prefix
  # does NOT inherit read-only status.
  bash_readonly_patterns:
    - '^(ls |cat |head |tail |grep |find |wc |diff |stat |file |ps |df |du |which |whoami |date |uname |pwd$)'
    - '^git (log|diff|status|show|branch|tag|remote|stash list)'
    - '^gh (pr list|pr view|issue list|issue view|run list|run view|auth status)'
    - '^docker (ps|logs |inspect |images)'
    - '^(infra-status|infra-path|bus-status)$'

  # Compound command guard: if the Bash command contains any of these shell composition
  # operators, it is NOT eligible for read-only classification regardless of prefix match.
  # This prevents "gh pr list && rm -rf /" from being classified as read-only.
  bash_compound_deny_patterns:
    - '&&'
    - ';'
    - '\|[^|]'    # pipe (but not ||)
    - '>[^&]'     # redirect (but not >& for stderr)
    - '>>'
    - '\$\('      # command substitution
    - '`'         # backtick substitution

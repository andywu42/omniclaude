title: "Fix latent NameError in error_handling.py PatternTrackingLogger"
summary: >
  PatternTrackingLogger.__init__ called datetime.now(UTC) but the module only imported
  `from datetime import datetime`, omitting the UTC constant. Adds UTC to the import (ruff
  rewrites `timezone.utc` to the Python 3.11+ `UTC` constant) and a regression test suite
  (3 tests) covering instantiation with and without a log_file argument.

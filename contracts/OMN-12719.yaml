schema_version: "1.0.0"
ticket_id: OMN-12719
title: "SubagentStop claim verifier blocks every subagent stop on newer Claude Code payload shapes"
summary: >
  Makes the SubagentStop claim verifier robust to newer Claude Code payload
  shapes. _extract_last_assistant_message now accepts the last_assistant_message
  direct field and reads the transcript_path / agent_transcript_path JSONL files,
  scanning assistant entries only. The verifier still fails closed on genuinely
  missing claim data (missing fence, malformed JSON, unreadable or malformed
  transcript, non-assistant report entries) — it does not silently pass on a
  recognized-but-reshaped payload.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: "SubagentStop claim verifier tests pass (old + new payload shapes, fail-closed cases)"
    command: "uv run pytest tests/hooks/test_subagent_claim_verifier.py -v"
emergency_bypass:
  enabled: false
  justification: ""

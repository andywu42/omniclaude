    description: "Static launcher tests prove omnimarket daemon launch uses --log-path without append redirection"
    command: "uv run pytest tests/scripts/test_omnimarket_launcher.py -q"
  - kind: manual
    description: "Changed launcher shell and test files pass formatting/lint"
    command: "uv run ruff check tests/scripts/test_omnimarket_launcher.py"
  - kind: manual
    description: "No emit-daemon log append redirection remains in daemon launch/restart blocks"
    command: "grep -n '>> \"${ONEX_STATE_DIR}/hooks/logs/emit-daemon.log\"' plugins/onex/hooks/scripts/session-start.sh plugins/onex/hooks/scripts/common.sh; test $? -eq 1"
  - kind: manual
    description: "Changed launcher shell scripts parse cleanly"
    command: "bash -n plugins/onex/hooks/scripts/session-start.sh plugins/onex/hooks/scripts/common.sh && echo 'bash syntax ok'"

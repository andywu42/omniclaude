  - kind: "manual"
    description: "Post-merge operator reinstall/deploy gate remains user-authorized"
    command: "user-authorized deploy: bash omniclaude/scripts/tick-bundle-install.sh; verify launchd status and /tmp/cron-merge-sweep logs after next tick"

    command: "git diff origin/main...HEAD -- src/omniclaude plugins/onex/hooks/lib tests | rg 'claude-3|gpt-|qwen|deepseek|model_name|served_model_id'"
  - kind: "manual"
    description: "Central OCC evidence binds OMN-11937 to Omniclaude PR #1646."
